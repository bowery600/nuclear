services:
  postgres:
    image: postgres:16
    container_name: nuclear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nuclear
      POSTGRES_PASSWORD: nuclear
      POSTGRES_DB: nuclear
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuclear -d nuclear"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

