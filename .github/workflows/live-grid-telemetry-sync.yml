name: Live Grid Telemetry Sync

on:
  schedule:
    # Runs every 15 minutes to fetch live electricity market prices.
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-grid-telemetry-sync
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TELEMETRY_LMP_NODE_OVERRIDES: ${{ secrets.TELEMETRY_LMP_NODE_OVERRIDES }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute live telemetry sync
        run: python scripts/telemetry_workers.py lmp